name: Test integrity of CRYPTO_THREAD_run_once 
# Jobs run daily

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
    check-crypto-thread-run-once:
      runs-on: windows-11-arm
      steps:
        - uses: actions/checkout@v6
          with:
            persist-credentials: false
        - name: Build
          run: |
            cl /nologo /O2 /std:c11 %* CRYPTO_THREAD_run_once_fastpath_race.c /Fe:CRYPTO_THREAD_run_once_fastpath_race.exe
        - name: Test
          run: |
            CRYPTO_THREAD_run_once_fastpath_race.exe

